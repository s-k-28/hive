<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="720" viewBox="0 0 1320 720" font-family="'Space Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0c0a14"/><stop offset="100%" stop-color="#070609"/></linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="a" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#8a88ad"/></marker>
    <marker id="am" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0 0 L9 5 L0 10 z" fill="#e34fd0"/></marker>
  </defs>
  <rect width="1320" height="720" fill="url(#bg)"/>
  <ellipse cx="660" cy="300" rx="520" ry="200" fill="#22d3ee" opacity="0.06" filter="url(#soft)"/>

  <text x="60" y="60" fill="#f3f1fb" font-size="30" font-weight="700">The Swarm — 6 agents · 4 roles · 1 tick</text>
  <text x="60" y="90" fill="#8d8aa8" font-size="16" font-family="ui-monospace, 'SF Mono', Menlo, monospace">each role is the same orchestrator function with a different prompt + behavior</text>

  <!-- GOAL -->
  <g transform="translate(70,300)">
    <rect x="0" y="-44" width="150" height="88" rx="14" fill="#11101b" stroke="#3a3550"/>
    <text x="75" y="-8" text-anchor="middle" fill="#dedcec" font-size="15" font-weight="700">GOAL</text>
    <text x="75" y="14" text-anchor="middle" fill="#8d8aa8" font-size="12">+ budget</text>
    <text x="75" y="30" text-anchor="middle" fill="#8d8aa8" font-size="12">+ repo (opt)</text>
  </g>
  <line x1="220" y1="300" x2="282" y2="300" stroke="#8a88ad" stroke-width="2.2" marker-end="url(#a)"/>

  <!-- PLANNER -->
  <g transform="translate(285,300)">
    <circle cx="80" cy="0" r="62" fill="#1a1606" stroke="#f5b94a" stroke-width="2" filter="url(#g)"/>
    <text x="80" y="-6" text-anchor="middle" fill="#f5d99a" font-size="17" font-weight="700">Planner</text>
    <text x="80" y="16" text-anchor="middle" fill="#cdb878" font-size="12">decompose →</text>
    <text x="80" y="32" text-anchor="middle" fill="#cdb878" font-size="12">DAG + risk tag</text>
  </g>
  <text x="365" y="216" text-anchor="middle" fill="#cdb878" font-size="12" font-family="ui-monospace,monospace">assigns specialist</text>
  <text x="365" y="232" text-anchor="middle" fill="#8d8aa8" font-size="11.5" font-family="ui-monospace,monospace">by semantic fit</text>

  <line x1="427" y1="300" x2="500" y2="300" stroke="#8a88ad" stroke-width="2.2" marker-end="url(#a)"/>
  <text x="463" y="290" text-anchor="middle" fill="#8d8aa8" font-size="11" font-family="ui-monospace,monospace">4–7 tasks</text>

  <!-- WORKERS x3 -->
  <g>
    <circle cx="585" cy="160" r="52" fill="#04181c" stroke="#22d3ee" stroke-width="2" filter="url(#g)"/>
    <text x="585" y="155" text-anchor="middle" fill="#9aeaf5" font-size="15" font-weight="700">worker-1</text>
    <text x="585" y="174" text-anchor="middle" fill="#6fb6c2" font-size="11">claims · works</text>

    <circle cx="585" cy="300" r="52" fill="#04181c" stroke="#22d3ee" stroke-width="2" filter="url(#g)"/>
    <text x="585" y="295" text-anchor="middle" fill="#9aeaf5" font-size="15" font-weight="700">worker-2</text>
    <text x="585" y="314" text-anchor="middle" fill="#6fb6c2" font-size="11">in parallel</text>

    <circle cx="585" cy="440" r="52" fill="#04181c" stroke="#22d3ee" stroke-width="2" filter="url(#g)"/>
    <text x="585" y="435" text-anchor="middle" fill="#9aeaf5" font-size="15" font-weight="700">worker-3</text>
    <text x="585" y="454" text-anchor="middle" fill="#6fb6c2" font-size="11">assume persona</text>
  </g>
  <line x1="525" y1="280" x2="540" y2="190" stroke="#8a88ad" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="535" y1="300" x2="530" y2="300" stroke="#8a88ad" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="525" y1="320" x2="540" y2="410" stroke="#8a88ad" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- CRITIC -->
  <g transform="translate(740,300)">
    <circle cx="62" cy="0" r="58" fill="#1c0518" stroke="#e34fd0" stroke-width="2" filter="url(#g)"/>
    <text x="62" y="-6" text-anchor="middle" fill="#f3a8e6" font-size="16" font-weight="700">Critic</text>
    <text x="62" y="14" text-anchor="middle" fill="#c46db0" font-size="11.5">review · accept</text>
    <text x="62" y="30" text-anchor="middle" fill="#c46db0" font-size="11.5">or bounce</text>
  </g>
  <line x1="637" y1="180" x2="745" y2="270" stroke="#8a88ad" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="637" y1="300" x2="722" y2="300" stroke="#8a88ad" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="637" y1="420" x2="745" y2="330" stroke="#8a88ad" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- bounce loop -->
  <path d="M770 360 C720 470 640 470 590 360" stroke="#e34fd0" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#am)"/>
  <text x="680" y="500" text-anchor="middle" fill="#c46db0" font-size="11.5" font-family="ui-monospace,monospace">reject → retry once with feedback (convergence cap)</text>

  <!-- ASSEMBLER -->
  <g transform="translate(910,300)">
    <circle cx="62" cy="0" r="58" fill="#0c1c06" stroke="#9af57a" stroke-width="2" filter="url(#g)"/>
    <text x="62" y="-6" text-anchor="middle" fill="#c4f5af" font-size="15" font-weight="700">Assembler</text>
    <text x="62" y="14" text-anchor="middle" fill="#8fcf78" font-size="11.5">compose →</text>
    <text x="62" y="30" text-anchor="middle" fill="#8fcf78" font-size="11.5">one artifact</text>
  </g>
  <line x1="864" y1="300" x2="910" y2="300" stroke="#8a88ad" stroke-width="2.2" marker-end="url(#a)"/>
  <text x="888" y="290" text-anchor="middle" fill="#8d8aa8" font-size="11" font-family="ui-monospace,monospace">accepted</text>

  <!-- ARTIFACT -->
  <g transform="translate(1050,300)">
    <line x1="22" y1="0" x2="60" y2="0" stroke="#8a88ad" stroke-width="2.2" marker-end="url(#a)"/>
    <rect x="62" y="-44" width="190" height="88" rx="14" fill="#0c1c06" stroke="#3a6a2a"/>
    <text x="157" y="-10" text-anchor="middle" fill="#9af57a" font-size="15" font-weight="700">ARTIFACT</text>
    <text x="157" y="12" text-anchor="middle" fill="#cfe9c0" font-size="12">→ Storage bucket</text>
    <text x="157" y="30" text-anchor="middle" fill="#8d8aa8" font-size="11.5">open / download</text>
  </g>

  <!-- shared memory band -->
  <g transform="translate(0,580)">
    <rect x="285" y="0" width="687" height="58" rx="14" fill="#0f0c1c" stroke="#3a2f5a"/>
    <text x="628" y="26" text-anchor="middle" fill="#a98bff" font-size="14" font-weight="700" font-family="ui-monospace,monospace">SHARED pgvector MEMORY</text>
    <text x="628" y="46" text-anchor="middle" fill="#bdb9d8" font-size="12.5">workers store what they learn · later agents recall by meaning (match_memories RPC)</text>
    <line x1="585" y1="492" x2="585" y2="578" stroke="#863bff" stroke-width="1.6" stroke-dasharray="5 5" opacity="0.7"/>
    <line x1="802" y1="360" x2="700" y2="578" stroke="#863bff" stroke-width="1.6" stroke-dasharray="5 5" opacity="0.5"/>
    <line x1="365" y1="362" x2="430" y2="578" stroke="#863bff" stroke-width="1.6" stroke-dasharray="5 5" opacity="0.5"/>
  </g>

  <!-- specialist catalog note -->
  <g transform="translate(1010,560)">
    <rect x="0" y="0" width="250" height="120" rx="14" fill="#11101b" stroke="#2c2a40"/>
    <text x="125" y="30" text-anchor="middle" fill="#f5d99a" font-size="26" font-weight="700">700+</text>
    <text x="125" y="54" text-anchor="middle" fill="#dedcec" font-size="13">specialist personas</text>
    <text x="125" y="78" text-anchor="middle" fill="#8d8aa8" font-size="11.5">Security Auditor, Code</text>
    <text x="125" y="94" text-anchor="middle" fill="#8d8aa8" font-size="11.5">Reviewer, DBA, …</text>
    <text x="125" y="110" text-anchor="middle" fill="#6f6c88" font-size="10.5" font-family="ui-monospace,monospace">assigned per task</text>
  </g>
</svg>
