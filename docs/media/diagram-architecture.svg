<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="860" viewBox="0 0 1320 860" font-family="'Space Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0a14"/><stop offset="100%" stop-color="#070609"/>
    </linearGradient>
    <linearGradient id="orch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1430"/><stop offset="100%" stop-color="#130f24"/>
    </linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7a78a0"/></marker>
    <marker id="arrP" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#863bff"/></marker>
    <marker id="arrC" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#22d3ee"/></marker>
  </defs>

  <rect width="1320" height="860" fill="url(#bg)"/>
  <ellipse cx="660" cy="360" rx="380" ry="240" fill="#863bff" opacity="0.10" filter="url(#soft)"/>

  <text x="60" y="62" fill="#f3f1fb" font-size="30" font-weight="700">HIVE — System Architecture</text>
  <text x="60" y="92" fill="#8d8aa8" font-size="16" font-family="ui-monospace, 'SF Mono', Menlo, monospace">the swarm thinking and the swarm rendering are the same event stream</text>

  <!-- 1 input row -->
  <g>
    <rect x="60" y="130" width="250" height="60" rx="12" fill="#11101b" stroke="#2c2a40"/>
    <text x="80" y="160" fill="#cfa75a" font-size="13" font-weight="700" font-family="ui-monospace,monospace">1 · GOAL</text>
    <text x="80" y="180" fill="#dedcec" font-size="15">You type a goal + budget</text>

    <line x1="310" y1="160" x2="370" y2="160" stroke="#7a78a0" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="372" y="130" width="170" height="60" rx="12" fill="#11101b" stroke="#2c2a40"/>
    <text x="392" y="160" fill="#a98bff" font-size="13" font-weight="700" font-family="ui-monospace,monospace">AUTH · RLS</text>
    <text x="392" y="180" fill="#dedcec" font-size="14">scoped to user</text>

    <line x1="542" y1="160" x2="602" y2="160" stroke="#7a78a0" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="604" y="130" width="250" height="60" rx="12" fill="#0e1018" stroke="#2a3c44"/>
    <text x="624" y="160" fill="#5fb8c8" font-size="13" font-weight="700" font-family="ui-monospace,monospace">POSTGRES</text>
    <text x="624" y="180" fill="#dedcec" font-size="15">INSERT missions row</text>
  </g>

  <line x1="729" y1="190" x2="729" y2="232" stroke="#7a78a0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- orchestrator core -->
  <g>
    <rect x="380" y="234" width="560" height="210" rx="18" fill="url(#orch)" stroke="#5a45a0" stroke-width="1.5" filter="url(#glow)"/>
    <text x="660" y="270" text-anchor="middle" fill="#c7b3ff" font-size="20" font-weight="700">ORCHESTRATOR — single Deno edge function</text>
    <text x="660" y="293" text-anchor="middle" fill="#8d8aa8" font-size="13" font-family="ui-monospace,monospace">one race-safe, idempotent tick · re-invokable · hard pass cap</text>

    <g font-size="14">
      <rect x="408" y="312" width="158" height="108" rx="10" fill="#0f0c1c" stroke="#33294f"/>
      <text x="487" y="338" text-anchor="middle" fill="#e8e6f5" font-weight="600">1 · Drain</text>
      <text x="487" y="360" text-anchor="middle" fill="#a9a6c2" font-size="12.5">interventions</text>
      <text x="487" y="378" text-anchor="middle" fill="#a9a6c2" font-size="12.5">(steering queue)</text>
      <text x="487" y="402" text-anchor="middle" fill="#6f6c88" font-size="11.5" font-family="ui-monospace,monospace">pause·kill·inject</text>

      <rect x="582" y="312" width="158" height="108" rx="10" fill="#0f0c1c" stroke="#33294f"/>
      <text x="661" y="338" text-anchor="middle" fill="#e8e6f5" font-weight="600">2 · Enforce</text>
      <text x="661" y="360" text-anchor="middle" fill="#a9a6c2" font-size="12.5">budget · steps · risk</text>
      <text x="661" y="378" text-anchor="middle" fill="#f5b94a" font-size="12.5">⛔ gate → hold</text>
      <text x="661" y="402" text-anchor="middle" fill="#6f6c88" font-size="11.5" font-family="ui-monospace,monospace">circuit breaker</text>

      <rect x="756" y="312" width="158" height="108" rx="10" fill="#0f0c1c" stroke="#33294f"/>
      <text x="835" y="338" text-anchor="middle" fill="#e8e6f5" font-weight="600">3 · Dispatch</text>
      <text x="835" y="360" text-anchor="middle" fill="#a9a6c2" font-size="12.5">ready tasks → roles</text>
      <text x="835" y="378" text-anchor="middle" fill="#a9a6c2" font-size="12.5">atomic claim</text>
      <text x="835" y="402" text-anchor="middle" fill="#6f6c88" font-size="11.5" font-family="ui-monospace,monospace">UPDATE...WHERE</text>
    </g>
  </g>

  <!-- role chips under orchestrator -->
  <g transform="translate(660,470)" text-anchor="middle" font-size="13" font-weight="600">
    <g transform="translate(-258,0)"><rect x="-52" y="-16" width="104" height="32" rx="16" fill="#1a1606" stroke="#f5b94a"/><text x="0" y="5" fill="#f5d99a">Planner</text></g>
    <g transform="translate(-86,0)"><rect x="-58" y="-16" width="116" height="32" rx="16" fill="#04181c" stroke="#22d3ee"/><text x="0" y="5" fill="#9aeaf5">Workers ×3</text></g>
    <g transform="translate(86,0)"><rect x="-44" y="-16" width="88" height="32" rx="16" fill="#1c0518" stroke="#e34fd0"/><text x="0" y="5" fill="#f3a8e6">Critic</text></g>
    <g transform="translate(252,0)"><rect x="-56" y="-16" width="112" height="32" rx="16" fill="#0c1c06" stroke="#9af57a"/><text x="0" y="5" fill="#c4f5af">Assembler</text></g>
  </g>

  <!-- AI gateway + pgvector flanks -->
  <g>
    <rect x="1010" y="270" width="250" height="74" rx="12" fill="#10101a" stroke="#2a3c44"/>
    <text x="1030" y="298" fill="#5fb8c8" font-size="13" font-weight="700" font-family="ui-monospace,monospace">AI GATEWAY</text>
    <text x="1030" y="318" fill="#dedcec" font-size="13.5">GPT-4o · Claude Haiku</text>
    <text x="1030" y="335" fill="#8d8aa8" font-size="12">via InsForge-managed key</text>
    <path d="M940 320 C975 320 980 307 1008 307" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrC)"/>
    <text x="958" y="300" fill="#6fb6c2" font-size="11" font-family="ui-monospace,monospace">reason</text>

    <rect x="1010" y="360" width="250" height="84" rx="12" fill="#10101a" stroke="#3a2f5a"/>
    <text x="1030" y="388" fill="#a98bff" font-size="13" font-weight="700" font-family="ui-monospace,monospace">PGVECTOR</text>
    <text x="1030" y="408" fill="#dedcec" font-size="13.5">shared swarm memory</text>
    <text x="1030" y="425" fill="#8d8aa8" font-size="12">HNSW · cosine recall</text>
    <path d="M940 392 C975 392 980 400 1008 400" stroke="#863bff" stroke-width="2" fill="none" marker-end="url(#arrP)"/>
    <text x="950" y="383" fill="#a98bff" font-size="11" font-family="ui-monospace,monospace">recall+store</text>
  </g>

  <line x1="660" y1="494" x2="660" y2="536" stroke="#7a78a0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- writes -->
  <rect x="430" y="538" width="460" height="62" rx="12" fill="#0e1018" stroke="#2a3c44"/>
  <text x="660" y="566" text-anchor="middle" fill="#5fb8c8" font-size="13" font-weight="700" font-family="ui-monospace,monospace">POSTGRES — every thought is a row</text>
  <text x="660" y="586" text-anchor="middle" fill="#dedcec" font-size="14">tasks advance · events appended (append-only, monotonic seq)</text>

  <line x1="660" y1="600" x2="660" y2="640" stroke="#7a78a0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="690" y="626" fill="#6f6c88" font-size="12" font-family="ui-monospace,monospace">DB trigger</text>

  <!-- realtime -->
  <rect x="450" y="642" width="420" height="56" rx="12" fill="#120f1c" stroke="#34294f"/>
  <text x="660" y="668" text-anchor="middle" fill="#c3aaff" font-size="13" font-weight="700" font-family="ui-monospace,monospace">REALTIME · publish → channel mission:{id}</text>
  <text x="660" y="687" text-anchor="middle" fill="#9a97b6" font-size="12.5">the write IS the broadcast</text>

  <line x1="660" y1="698" x2="660" y2="738" stroke="#7a78a0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- browser -->
  <rect x="360" y="740" width="600" height="74" rx="14" fill="#10131c" stroke="#2f4a44"/>
  <text x="660" y="768" text-anchor="middle" fill="#7fe6c0" font-size="14" font-weight="700">BROWSER · React 19</text>
  <text x="660" y="790" text-anchor="middle" fill="#dedcec" font-size="14">realtime → Zustand store → live deck: task DAG · cost meter · risk gate</text>
  <text x="660" y="807" text-anchor="middle" fill="#8d8aa8" font-size="12">dedupe by seq · pure reducer · 60fps</text>

  <!-- storage -->
  <rect x="1010" y="752" width="250" height="50" rx="12" fill="#0c1c06" stroke="#3a6a2a"/>
  <text x="1135" y="773" text-anchor="middle" fill="#9af57a" font-size="13" font-weight="700" font-family="ui-monospace,monospace">STORAGE</text>
  <text x="1135" y="791" text-anchor="middle" fill="#cfe9c0" font-size="13">artifact → download</text>
  <path d="M960 777 L1008 777" stroke="#9af57a" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- STEERING LOOP back up left side -->
  <path d="M360 777 C150 777 90 560 90 470 C90 330 200 300 378 320" stroke="#e34fd0" stroke-width="2.2" fill="none" stroke-dasharray="7 6" marker-end="url(#arr)" opacity="0.85"/>
  <g transform="translate(120,540)">
    <rect x="-66" y="-26" width="170" height="80" rx="12" fill="#1c0518" stroke="#e34fd0"/>
    <text x="19" y="-4" text-anchor="middle" fill="#f3a8e6" font-size="12.5" font-weight="700" font-family="ui-monospace,monospace">STEERING</text>
    <text x="19" y="16" text-anchor="middle" fill="#dedcec" font-size="12">pause · resume · kill</text>
    <text x="19" y="34" text-anchor="middle" fill="#dedcec" font-size="12">+budget · approve · inject</text>
  </g>
  <text x="120" y="360" fill="#c46db0" font-size="11.5" font-family="ui-monospace,monospace" text-anchor="middle">interventions row → kicks orchestrator</text>
</svg>
